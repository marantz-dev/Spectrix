 url=https://github.com/marantz-dev/Spectrix/blob/main/.github/workflows/ci.yml
name: CI — build Spectrix VST3 (macOS & Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you run this manually from the Actions page

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a || ver
          cmake --version || true

      - name: Configure (CMake)
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Debug: show build tree (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "===== build tree ====="
          ls -la build || true
          # show deeper contents so we can find Spectrix.dll/.vst3
          find build -maxdepth 6 -iname 'Spectrix*' -print || true
          echo "===== end build tree ====="

      - name: Zip entire build folder (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # create a zip of the entire build directory so you can download and inspect it locally
          set -e
          if [ -d build ]; then
            rm -f build-windows-full.zip || true
            zip -r build-windows-full.zip build || true
          else
            echo "No build folder found to zip."
          fi

      - name: Zip entire build folder (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d build ]; then
            rm -f build-macos-full.zip || true
            zip -r build-macos-full.zip build || true
          else
            echo "No build folder found to zip."
          fi

      - name: Pack specific plugin artifacts (optional)
        run: |
          mkdir -p build/packaged
          # try to pick the Spectrix outputs; these are additional convenience zips
          find build -type d -iname 'Spectrix.vst3' -exec cp -R '{}' build/packaged/ \; || true
          find build -type f -iname 'Spectrix.dll' -exec cp '{}' build/packaged/ \; || true
          (cd build/packaged && zip -r ../spectrix-outputs.zip .) || true

      - name: Upload build artifact(s)
        uses: actions/upload-artifact@v4
        with:
          # upload the platform full build zips if present, and also the focused plugin zip
          name: build-artifacts-${{ matrix.os }}
          path: |
            build-windows-full.zip
            build-macos-full.zip
            build/spectrix-outputs.zip
